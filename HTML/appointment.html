<form>
<fieldset>
			<legend>  Appointment Form </legend>		<!--Borrowed struture from personal html code-->
			<label> Title&colon; </label>
			<select class="textboxex" name="Title" required>
				<option value="" selected="selected"> Select a Title </option>
				<option value="Ms."> Ms. </option>
				<option value="Mr."> Mr. </option>
				<option value="Mrs."> Mrs. </option>
			</select>
			<br><br>
			
		<label> First Name&colon; </label>
			<input type="text" name="fname" class="textboxex" required> <br> <br>
			
			<label> Middle Name (IF APPLICABLE)&colon; </label>
			<input type="text" class="textboxex" name="mname" required> <br> <br>
			
		<label> Last Name&colon; </label>
			<input type="text" class="textboxex" name="lname" required> <br> <br>
			
		<label> Gender&colon; </label><br>
			&nbsp;&nbsp;&nbsp;
			Male <input type="radio" class="textboxex" name="gender"  value="Male" required> <br>
			&nbsp;&nbsp;&nbsp;
			Female <input type="radio" class="textboxex" name="gender"  value="Female" required><br><br>
			
		<label> Address&colon; </label>
			 <textarea class="textboxex" rows="5" cols="20" required> </textarea><br><br>
			 
		<label> All Avaliable Hospitals &colon; </label><br> <br>

		<iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d502156.0546853434!2d-61.52381825230253!3d10.49324189315376!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1shospital!5e0!3m2!1sen!2stt!4v1746554337532!5m2!1sen!2stt" 
		width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>	<br> <br>		 
		
		
			<label> Select Hospital (TYPE ONE OF THE AVAILABLE HOSPITALS FROM ABOVE)&colon; </label><br><br>
			<input type="text" class="textboxex" name="hospitalselect" required> <br> <br><br>
			
			<label> Select Time and Date&colon; </label>
			<input type="date" name="dateselect" class="date" required>
			<input type="time" name="timeselect" class="date" required><br><br>
			
			
		<label> Email Address&colon; </label>
			<input type="text" class="textboxex" name="email" required> <br> <br> <br>
			
		<label> Phone Number&colon; </label>
			<input type="text" class="textboxex" name="phonenum" placeholder="Eg:1-868-748-2849" required> <br> <br> 
			
		<button type="submit" value="submit"  class="button" formaction="../HTML/endapp.html">SUBMIT</button> &nbsp;
			
		<button type="reset" value="reset"  class="button" >CLEAR</button>
		
</fieldset>
</form>
